# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build CV

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ push-bib, push-cv-data ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: true
          fetch-depth: 0
      - name: Update data/bibliography submodules
        run: git submodule update --remote --recursive
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
      - name: Render CV (PDF + HTML)
        run: quarto render cv.qmd --to pdf,html
      - name: Commit
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Srikrishnan-CV.pdf cv.html data bibliography
          git diff --staged --quiet || git commit -m "update CV"
      - name: Push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
